<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Countdown Timer</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div>
  <h1>CountdownTimer</h1>

  <div id="countdown">
    <div class="time-box">
      <span id="days">00</span>
      <p>Days</p>
    </div>
    
    <div class="time-box">
      <span id="hours">00</span>
      <p>Hours</p>
    </div>
    
    <div class="time-box">
      <span id="minutes">00</span>
      <p>Minutes</p>
    </div>
    
    <div class="time-box">
      <span id="seconds">00</span>
      <p>Seconds</p>
    </div>
    
    <div class="time-box">
      <span id="milliseconds">00</span>
      <p>Ms</p>
    </div>
    
  </div>
  <div>
    <div class="beep">
      <button onclick="playBeep()">Enable sound</button>
    </div>
  </div>

  <div class="paragraph">
    <span>Remaining to exam's week</span>
  </div>
  
  <script src="script.js"></script>
</body>
</html>
